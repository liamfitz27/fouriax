repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'python -m ruff check .'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: bash -c 'python -m mypy src'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: bash -c 'PYTHONPATH=src python -m pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
